name: UwayFinance

options:
  bundleIdPrefix: com.uway
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 5
    MARKETING_VERSION: 0.10.2

configs:
  Debug: debug
  Release: release

targets:
  UwayFinance:
    type: application
    platform: iOS
    sources:
      - path: UwayFinance
        excludes:
          - Resources
      - path: UwayFinance/Resources/Assets.xcassets
        buildPhase: resources
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uway.finance
        PRODUCT_NAME: UwayFinance
        INFOPLIST_FILE: UwayFinance/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: Charts.framework

  UwayFinanceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: UwayFinanceTests
        excludes:
          - Fixtures
      - path: UwayFinanceTests/Fixtures
        buildPhase: resources
    dependencies:
      - target: UwayFinance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uway.finance.tests
        GENERATE_INFOPLIST_FILE: true

schemes:
  UwayFinance:
    build:
      targets:
        UwayFinance: all
        UwayFinanceTests: [test]
    test:
      gatherCoverageData: true
      targets:
        - UwayFinanceTests
